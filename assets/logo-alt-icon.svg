<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="92" fill="#0f0f1a"/>

  <!-- Two horizontal bars -->
  <rect x="72" y="68" width="368" height="60" rx="30" fill="#6c63ff"/>
  <rect x="72" y="234" width="368" height="60" rx="30" fill="#a78bfa"/>

  <!-- Vertical double-headed arrow between bars; shaft has square corners; scaled 1.35× about center (256,181) -->
  <g
    fill="#c4b5fd"
    stroke="none"
    aria-hidden="true"
    transform="translate(256 181) scale(1.35) translate(-256 -181)">
    <path d="M256 148 L236 166 h40 Z"/>
    <rect x="246" y="164" width="20" height="34"/>
    <path d="M256 214 L236 196 h40 Z"/>
  </g>

  <!-- Wordmark: span matches bar width (72 + 368 = 440); equal gap adjustment via lengthAdjust -->
  <text
    x="72"
    y="458"
    text-anchor="start"
    fill="#e8e8f0"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="600"
    font-size="152"
    text-rendering="geometricPrecision"
    textLength="368"
    lengthAdjust="spacing">&#xA3;&#x20A9;$</text>
</svg>
