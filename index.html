<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>RateStack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.ico" sizes="48x48">
  <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-full bg-bg text-main antialiased overflow-x-hidden">
  <div id="app" class="max-w-[480px] mx-auto px-5 pt-4 pb-10 min-h-screen">
    <div id="update-banner" class="hidden mb-3 px-3 py-2 rounded-xl bg-[var(--color-accent-bg)] border border-brd text-[13px] text-main flex items-center justify-between gap-2" role="status">
      <span id="update-banner-text"></span>
      <button type="button" id="update-reload" class="shrink-0 text-accent font-semibold underline underline-offset-2 bg-transparent border-none cursor-pointer"></button>
    </div>

    <header class="flex items-start justify-between gap-3 pt-3 pb-2">
      <div class="min-w-0">
        <h1 class="text-[26px] font-bold tracking-[-0.5px] gradient-text leading-tight">RateStack</h1>
        <p id="app-tagline" class="text-[11px] text-dim mt-0.5 leading-snug max-w-[240px]"></p>
      </div>
      <button id="settings-btn" class="bg-transparent border-none text-dim cursor-pointer p-2 rounded-[10px] transition-colors flex items-center justify-center hover:bg-surface hover:text-main" aria-label="Settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div id="rate-info" class="grid grid-cols-[minmax(0,1fr)_auto] gap-x-2 gap-y-0.5 items-center pt-1 pb-4">
      <span id="rate-timestamp" class="text-xs text-dim min-w-0 col-start-1 row-start-1"></span>
      <button id="refresh-btn" type="button" class="col-start-2 row-start-1 bg-transparent border-none text-dim cursor-pointer p-2 rounded-[10px] transition-colors flex items-center justify-center hover:bg-surface hover:text-main shrink-0 self-center" aria-label="Refresh rates">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <span id="rate-offline" class="col-span-2 text-[11px] text-amber-400 hidden" role="status"></span>
      <span id="rate-stale" class="col-span-2 text-[11px] text-amber-500 hidden" role="status"></span>
      <span id="rate-error" class="col-span-2 text-[11px] text-red-400 hidden" role="alert"></span>
    </div>

    <main id="converter" class="flex flex-col gap-3">
    </main>

    <p id="rate-disclaimer" class="text-[10px] text-dim/80 leading-snug pt-2 px-0.5 hidden"></p>

    <footer class="flex items-center justify-center gap-2 pt-8 pb-2 text-[11px] text-dim/70">
      <span id="app-version">dev</span>
      <span>·</span>
      <a href="https://github.com/cgtm/ratestack/issues" target="_blank" rel="noopener" class="underline underline-offset-2 hover:text-dim transition-colors">Issues</a>
    </footer>

    <div id="settings-overlay" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-lg flex items-end justify-center overlay-transition opacity-0 invisible pointer-events-none">
      <div id="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title" class="bg-surface rounded-t-[20px] w-full max-w-[480px] max-h-[94dvh] flex flex-col px-5 pt-6 panel-transition translate-y-full">
        <div class="flex items-center justify-between mb-1 shrink-0 relative">
          <h2 id="settings-title" class="text-xl font-bold">Settings</h2>
          <span id="settings-saved" class="absolute inset-0 flex items-center justify-center text-[11px] text-[#34d399] font-semibold opacity-0 transition-opacity duration-300 pointer-events-none"></span>
          <button id="settings-close" class="bg-transparent border-none text-dim cursor-pointer p-2 rounded-[10px] flex items-center hover:text-main" aria-label="Close settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="shrink-0 mb-4 relative">
          <div class="flex items-center gap-2 mb-2">
            <svg class="shrink-0 text-accent" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            <p id="language-label" class="text-xs font-semibold text-dim uppercase tracking-widest">Language</p>
          </div>
          <div id="language-picker"></div>
        </div>
        <div class="shrink-0 mb-4 relative">
          <div class="flex items-center gap-2 mb-2">
            <svg class="shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <!-- Equilateral triangle, side 10, Material 300 RGB; square viewBox so 16×16 has no letterboxing. -->
              <circle cx="12" cy="7.67" r="5" fill="#e57373" stroke="var(--color-bg)" stroke-width="2"/>
              <circle cx="7" cy="16.33" r="5" fill="#81c784" stroke="var(--color-bg)" stroke-width="2"/>
              <circle cx="17" cy="16.33" r="5" fill="#64b5f6" stroke="var(--color-bg)" stroke-width="2"/>
            </svg>
            <p id="theme-label" class="text-xs font-semibold text-dim uppercase tracking-widest">Theme</p>
          </div>
          <div id="theme-picker"></div>
        </div>
        <div class="flex items-center gap-2 mb-2 shrink-0">
          <svg class="shrink-0 text-accent" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <circle cx="12" cy="12" r="2"/>
            <path d="M6 12h.01M18 12h.01"/>
          </svg>
          <p id="currencies-label" class="text-xs font-semibold text-dim uppercase tracking-widest">Currencies</p>
        </div>
        <div class="flex items-baseline justify-between mb-3 shrink-0">
          <p class="settings-hint text-[13px] text-dim">Select 2–5 currencies</p>
          <span id="settings-count" class="text-[13px] text-dim"></span>
        </div>
        <div id="selected-list" class="flex flex-col gap-1.5 shrink-0 empty:hidden mb-3"></div>
        <div class="h-[2px] bg-brd shrink-0 mb-3" id="selected-divider"></div>
        <div id="currency-list" class="flex flex-col gap-1.5 overflow-y-auto overscroll-contain pb-6"></div>
      </div>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
