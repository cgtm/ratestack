name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version tag
        id: bump
        run: |
          MSG=$(git log -1 --format='%s')
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT#v}"

          if [[ "$MSG" == *"[major]"* ]]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [[ "$MSG" == *"[minor]"* ]]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [[ "$MSG" == *"[patch]"* ]]; then
            PATCH=$((PATCH + 1))
          else
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          git tag "$NEW"
          git push origin "$NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Install Tailwind CSS v4
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64

      - name: Build Tailwind CSS
        run: |
          ./tailwindcss-linux-x64 -i src/styles.css -o style.css --minify
          rm tailwindcss-linux-x64

      - name: Stamp version and service worker
        run: |
          sed -i "s/>dev</>${{ steps.bump.outputs.version }}</" index.html
          sed -i "s/ratestack-v[0-9]*/ratestack-${GITHUB_SHA::7}/" sw.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
