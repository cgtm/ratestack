name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Generate service worker precache list
        run: node scripts/generate-sw.mjs

      - name: Stage site for Pages
        run: |
          mkdir -p dist
          cp index.html manifest.json sw.js style.css dist/
          cp -r src assets dist/

      - name: Stamp version and service worker
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/>dev</>v${VERSION}</" dist/index.html
          sed -i "s/ratestack-v[0-9]*/ratestack-${GITHUB_SHA::7}/" dist/sw.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then exit 0; fi
          MAJOR="${VERSION%%.*}"
          REPO="${{ github.repository }}"
          if [[ "$MAJOR" == "v0" ]]; then
            gh release create "$VERSION" --generate-notes --prerelease --repo "$REPO"
          else
            gh release create "$VERSION" --generate-notes --repo "$REPO"
          fi
